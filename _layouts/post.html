---
layout: post
---

<article>
  <h1>{{ page.title }}</h1>
  <p class="meta">{{ page.date | date: "%B %d, %Y" }}</p>
  <div class="content">
    {{ content }}
  </div>
  <section>
    <div>
      <p> submitted by <link href="mailto:{{page.email}}">{{ page.author }}</link></p>
    </div>
  </section>
</article>
